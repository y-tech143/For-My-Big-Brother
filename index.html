<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brotherhood_Engine.exe [SECURED]</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0d1117; --code-green: #7ee787; --code-blue: #79c0ff; --code-gold: #d4bbff; --neon-blue: #58a6ff; --border: #30363d; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background-color: var(--bg-dark); color: #c9d1d9; font-family: 'Fira Code', monospace; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #particles-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .particle { position: absolute; color: var(--neon-blue); font-size: 14px; opacity: 0.15; animation: drift 8s infinite linear; }
        @keyframes drift { 0% { transform: translateY(110vh) rotate(0deg); opacity: 0; } 50% { opacity: 0.3; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }
        .terminal-card { width: 95%; max-width: 500px; background: #161b22; border: 1px solid var(--border); border-radius: 12px; padding: 30px; position: relative; z-index: 10; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        .terminal-header { display: flex; gap: 8px; margin-bottom: 25px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }
        .progress { color: var(--code-blue); font-size: 0.75rem; margin-bottom: 10px; letter-spacing: 1px; }
        .content-area { min-height: 220px; transition: 0.3s ease; }
        .keyword { color: #ff7b72; } .function { color: var(--code-gold); } .string { color: var(--code-green); } .comment { color: #8b949e; font-style: italic; }
        h2 { font-size: 1.4rem; color: #fff; margin-bottom: 15px; font-family: 'Inter', sans-serif; }
        .nav-controls { display: flex; justify-content: space-between; margin-top: 30px; gap: 15px; }
        button { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid var(--neon-blue); background: transparent; color: var(--neon-blue); font-family: 'Fira Code'; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.8rem; }
        button:hover:not(:disabled) { background: var(--neon-blue); color: #000; }
        button:disabled { opacity: 0.2; cursor: not-allowed; border-color: #484f58; color: #484f58; }
        #hero-overlay { position: fixed; inset: 0; background: var(--bg-dark); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; transition: 0.6s; }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="hero-overlay">
        <span class="comment" style="margin-bottom: 10px;">// Encrypted_Session: Active</span>
        <h1 style="color: #fff; margin-bottom: 20px; font-family: 'Inter'; font-weight: 800; font-size: 2rem;">The Architect of My Foundation</h1>
        <p style="color: var(--code-blue); margin-bottom: 30px; letter-spacing: 1px;">> Security Level: Maximum</p>
        <button onclick="startApp()" style="flex:none; width: 220px; background: var(--neon-blue); color: #000;">EXECUTE SCAN</button>
    </div>

    <div id="particles-container"></div>

    <div class="terminal-card">
        <div class="terminal-header">
            <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
        </div>
        <div class="progress" id="counter">LOG_SEGMENT: 01 / 08</div>
        <div class="content-area" id="terminal-content"></div>
        <div class="nav-controls">
            <button id="backBtn" onclick="change(-1)" disabled>BACK</button>
            <button id="nextBtn" onclick="change(1)">NEXT</button>
        </div>
    </div>

    <script>
        // SECURITY SCRIPT: Disable Inspect Element & Shortcuts
        document.onkeydown = function(e) {
            if(event.keyCode == 123) return false; // F12
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; // Ctrl+Shift+I
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false; // Ctrl+Shift+C
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; // Ctrl+Shift+J
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ctrl+U
        };

        // DevTools Anti-Tamper
        setInterval(() => {
            (function() {
                const start = new Date();
                debugger; 
                const end = new Date();
                if (end - start > 100) {
                    window.location.reload();
                }
            })();
        }, 1000);

        const steps = [
            { title: 'The Board of Directors', lines: ['<span class="keyword">const</span> Advice = <span class="function">Bhai.getOpinion()</span>;', '<span class="comment">// Jinke mashware ke bina mera koi bhi</span>', '<span class="comment">// bada kaam poora nahi hota.</span>', '<span class="keyword">if</span> (Task.isMajor()) { <span class="keyword">return</span> Advice; }'] },
            { title: 'Crisis Manager', lines: ['<span class="keyword">function</span> <span class="function">emergencyProtocol</span>(problem) {', '  <span class="comment">// Jab bhi koi problem aati hai,</span>', '  <span class="comment">// unke paas solution ready hota hai.</span>', '  <span class="keyword">return</span> Bhai.solve(problem);', '}'] },
            { title: '24/7 Support System', lines: ['<span class="keyword">while</span> (currentTime == <span class="string">"02:00 AM"</span>) {', '  <span class="function">Bhai.isAvailable</span> = <span class="keyword">true</span>;', '  <span class="comment">// Hamesha ek call ki doori par.</span>', '  <span class="keyword">break</span>; ', '}'] },
            { title: 'Source Code of My Success', lines: ['<span class="keyword">const</span> MyDreams = <span class="keyword">new</span> <span class="function">Achievement</span>({', '  line_01: <span class="string">"Bhai_ka_Sath"</span>,', '  <span class="comment">// Meri har kamyabi ka pehla line</span>', '  <span class="comment">// unhone hi likha hai.</span>', '});'] },
            { title: 'Bug Fixer', lines: ['<span class="keyword">try</span> { Life.execute(); }', '<span class="keyword">catch</span> (Error) {', '  <span class="function">Bhai.fixBug</span>(Error);', '  <span class="comment">// Life ki har error ko solve karne wale.</span>', '}'] },
            { title: 'The ATM (Sometime)', lines: ['<span class="keyword">if</span> (Wallet.status == <span class="string">"Empty"</span>) {', '  <span class="function">Bhai.transferFunds()</span>;', '  <span class="comment">// Bina sawal kiye help karne wale.</span>', '  <span class="keyword">return</span> <span class="string">"Success"</span>;', '}'] },
            { title: 'Google Maps of Life', lines: ['<span class="keyword">if</span> (Yashuu.isLost()) {', '  <span class="function">Bhai.setDirection</span>(<span class="string">"RightPath"</span>);', '  <span class="comment">// Sahi direction dikhane wale.</span>', '}'] },
            { title: 'System Status: UNBEATABLE', lines: ['<span class="keyword">export</span> <span class="keyword">default</span> <span class="function">The_Legend_Bhai</span>;', '<span class="comment">// Real Founder of my Life.</span>', '<span class="comment">// Respect & Love, Yashuu.</span>', '<span class="keyword">return</span> <span class="string">"Legendary_Status"</span>;'] }
        ];

        let currentIdx = 0;
        function startApp() { document.getElementById('hero-overlay').style.opacity = '0'; setTimeout(() => { document.getElementById('hero-overlay').style.display = 'none'; createParticles(); updateUI(); }, 600); }
        function updateUI() {
            const container = document.getElementById('terminal-content');
            const step = steps[currentIdx];
            container.style.opacity = 0;
            setTimeout(() => {
                let html = `<h2>${step.title}</h2><div style="margin-top:15px; background:#0d1117; padding:15px; border-radius:6px; font-size:0.85rem; border:1px solid var(--border);">`;
                step.lines.forEach(line => { html += `<p style="margin-bottom:5px;">${line}</p>`; });
                html += `</div>`;
                container.innerHTML = html; container.style.opacity = 1;
                document.getElementById('counter').innerText = `LOG_SEGMENT: ${(currentIdx + 1).toString().padStart(2, '0')} / ${steps.length.toString().padStart(2, '0')}`;
                document.getElementById('backBtn').disabled = currentIdx === 0;
                document.getElementById('nextBtn').innerText = currentIdx === steps.length - 1 ? "FINISH" : "NEXT";
            }, 200);
        }
        function change(delta) { currentIdx += delta; if(currentIdx >= steps.length) { alert("Respect, Bhai! System Securely Logged Out."); currentIdx = steps.length - 1; } updateUI(); }
        function createParticles() {
            const container = document.getElementById('particles-container');
            const tags = ['{ }', '</>', '01', 'log', 'Bhai', '=>', ';'];
            setInterval(() => {
                const p = document.createElement('div'); p.classList.add('particle'); p.innerText = tags[Math.floor(Math.random() * tags.length)];
                p.style.left = Math.random() * 100 + "vw"; p.style.animationDuration = (Math.random() * 4 + 6) + "s";
                container.appendChild(p); setTimeout(() => p.remove(), 8000);
            }, 400);
        }
    </script>
</body>
</html>
